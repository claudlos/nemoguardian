# docker-compose.yml for self-hosted nemoguardian
#
# Usage:
#   1. Provision a GPU cloud instance (Vast.ai, DO, Hetzner, your own box)
#   2. SSH in, install Docker + nvidia-container-toolkit
#   3. Save your API key from /billing/welcome into .env (below)
#   4. docker compose up -d
#   5. curl http://localhost:8000/health

x-nemoguardian-env: &nemoguardian-env
  NEMOGUARDIAN_API_KEY: ${NEMOGUARDIAN_API_KEY:-nmg_change_me}
  NEMOGUARDIAN_SELF_HOSTED_EMAIL: ${NEMOGUARDIAN_SELF_HOSTED_EMAIL:-self-hosted@nemoguardian.local}
  STRIPE_CUSTOMER_ID: ${STRIPE_CUSTOMER_ID:-}
  NEMOGUARDIAN_TIER: ${NEMOGUARDIAN_TIER:-self_hosted}
  NEMOGUARDIAN_CASCADE_MODE: ${NEMOGUARDIAN_CASCADE_MODE:-standard}
  NEMOGUARDIAN_QUANTIZE: ${NEMOGUARDIAN_QUANTIZE:-1}
  NEMOGUARDIAN_QWEN_MODEL: ${NEMOGUARDIAN_QWEN_MODEL:-Qwen/Qwen3Guard-Gen-4B}
  NEMOGUARDIAN_QWEN_STREAM_MODEL: ${NEMOGUARDIAN_QWEN_STREAM_MODEL:-Qwen/Qwen3Guard-Stream-0.6B}
  NEMOGUARDIAN_CSR_MODEL: ${NEMOGUARDIAN_CSR_MODEL:-nvidia/Nemotron-Content-Safety-Reasoning-4B}
  NEMOGUARDIAN_TRIAGE_MODEL: ${NEMOGUARDIAN_TRIAGE_MODEL:-nvidia/nemotron-3-ultra-220b-a12b}
  NEMOGUARDIAN_TRIAGE_BASE_URL: ${NEMOGUARDIAN_TRIAGE_BASE_URL:-}
  NEMOGUARDIAN_ENABLE_DEMO_ENDPOINT: ${NEMOGUARDIAN_ENABLE_DEMO_ENDPOINT:-0}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

services:
  nemoguardian:
    build:
      context: .
      args:
        NEMOGUARDIAN_SKIP_PREDOWNLOAD: "1"
    image: nemoguardian/self-hosted:latest
    runtime: nvidia
    ports:
      - "8000:8000"
    environment:
      <<: *nemoguardian-env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
